apiVersion: 1

datasources:
  - name: homeassistant
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: homeassistant
    user: homeassistant
    jsonData:
      httpMode: GET
    secureJsonData:
      password: ${HASS_INFLUXDB_PASSWORD}
    version: 1
    editable: false
