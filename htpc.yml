---
services:
  sonarr:
    image: linuxserver/sonarr
    environment:
      - PUID=${UID}
      - PGID=${UID}
      - TZ=${TZ}
      - UMASK_SET=022  # optional
    volumes:
      - $PWD/sonarr:/config
      - $PWD/medias:/data
    ports:
      - 8989:8989
    restart: unless-stopped


  radarr:
    image: linuxserver/radarr
    environment:
      - PUID=${UID}
      - PGID=${UID}
      - TZ=${TZ}
      - UMASK_SET=022  # optional
    volumes:
      - $PWD/radarr:/config
      - $PWD/medias:/data
    ports:
      - 7878:7878
    restart: unless-stopped

  jackett:
    image: linuxserver/jackett
    environment:
      - PUID=${UID}
      - PGID=${UID}
      - TZ=${TZ}
    ports:
      - 9117:9117
    volumes:
      - $PWD/jackett:/config/Jackett
      - $PWD/medias:/data
    restart: unless-stopped

  transmission:
    image: linuxserver/transmission
    environment:
      - PUID=${UID}
      - PGID=${UID}
      - TZ=${TZ}
    volumes:
      - $PWD/transmission:/config
      - $PWD/medias:/data
    ports:
      - 9091:9091
    restart: unless-stopped

  jellyfin:
    image: jellyfin/jellyfin
    environment:
      - PUID=${UID}
      - PGID=${UID}
      - TZ=${TZ}
    volumes:
      - $PWD/jellyfin/config:/config
      - $PWD/jellyfin/cache:/cache
      - $PWD/medias:/media
    ports:
      - 8096:8096
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr
    environment:
      - PUID=${UID}
      - PGID=${UID}
      - TZ=${TZ}
    volumes:
      - $PWD/bazarr:/config
      - $PWD/medias:/data
    restart: unless-stopped
