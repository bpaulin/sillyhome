apiVersion: 1

deleteDatasources:
  - name: Prometheus
  - name: Graphite
  - name: InfluxDB

datasources:
  - name: telegraf
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: telegraf
    isDefault: true
    jsonData:
      httpMode: GET
    version: 1
    editable: false
